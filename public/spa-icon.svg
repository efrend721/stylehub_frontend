<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc004e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo circular -->
  <circle cx="50" cy="50" r="45" fill="url(#primaryGradient)" opacity="0.1"/>
  
  <!-- Icono de Spa (flor/hoja estilizada) -->
  <path d="M50 25 C40 25, 30 35, 30 45 C30 55, 40 65, 50 65 C60 65, 70 55, 70 45 C70 35, 60 25, 50 25 Z" fill="#1976d2"/>
  
  <!-- Icono de tijeras pequeño -->
  <g transform="translate(60, 35) rotate(15)">
    <path d="M0 0 L8 8 M8 0 L0 8 M4 4 L12 4" stroke="#dc004e" stroke-width="2" fill="none"/>
    <circle cx="2" cy="2" r="1.5" fill="#dc004e"/>
    <circle cx="6" cy="6" r="1.5" fill="#dc004e"/>
  </g>
  
  <!-- Puntos decorativos -->
  <circle cx="25" cy="30" r="2" fill="#1976d2" opacity="0.6"/>
  <circle cx="75" cy="70" r="2" fill="#dc004e" opacity="0.6"/>
  <circle cx="20" cy="70" r="1.5" fill="#1976d2" opacity="0.4"/>
  <circle cx="80" cy="30" r="1.5" fill="#dc004e" opacity="0.4"/>
</svg>